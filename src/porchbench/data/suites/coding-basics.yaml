suite:
  name: "Coding Basics"
  version: "2.0"
  rubric: coding
  description: >
    Curated prompts for LLM-as-judge evaluation. Focuses on tasks where
    quality, style, reasoning depth, and design judgment matter — not just
    correctness. Scored via frontier model rubric (rubrics/default.yaml).

defaults:
  options:
    temperature: 0
    seed: 42
    top_p: 1
    num_predict: 4096
    num_ctx: 32768

prompts:

  # =========================================================================
  # CODING — easy (implementation quality, not just correctness)
  # =========================================================================

  - id: "code-fizzbuzz"
    category: coding
    difficulty: easy
    tags: [python, loops, conditionals]
    contamination_risk: high
    expected_answer: >
      Must check divisibility by 15 (or both 3 and 5) before checking 3 or 5
      individually. Should use range(1, 101). Output must include FizzBuzz for
      15, 30, 45, etc.
    messages:
      - role: user
        content: |
          Write a Python function that prints numbers 1 to 100.
          For multiples of 3 print "Fizz", for multiples of 5 print "Buzz",
          for multiples of both print "FizzBuzz".

  - id: "code-word-count"
    category: coding
    difficulty: easy
    tags: [python, strings, dicts]
    contamination_risk: medium
    expected_answer: >
      Must lowercase input and strip punctuation before counting. Should
      handle empty strings. A correct solution for "Hello hello, world!"
      produces {"hello": 2, "world": 1}.
    messages:
      - role: user
        content: |
          Write a Python function that takes a string of text and returns
          a dictionary mapping each word to the number of times it appears.
          Handle punctuation and case-insensitivity.

  - id: "code-validate-email"
    category: coding
    difficulty: easy
    tags: [python, validation, regex]
    contamination_risk: medium
    expected_answer: >
      Must check for exactly one @, non-empty local part and domain, at least
      one dot in domain portion, no spaces. Should not accept "user@" or
      "@domain.com" or "user@domain".
    messages:
      - role: user
        content: |
          Write a Python function that validates an email address.
          It should check for basic structure (user@domain.tld) without
          using a regex library. Explain your validation choices.

  - id: "code-list-comprehension"
    category: coding
    difficulty: easy
    tags: [python, idioms]
    contamination_risk: medium
    expected_answer: >
      Correct comprehension: [n ** 2 for n in numbers if n % 2 == 0].
      Should note that comprehension is more readable and slightly faster
      for simple transformations but less suitable for complex multi-step logic.
    messages:
      - role: user
        content: |
          Rewrite this function using Python list comprehensions and explain
          why the comprehension version is (or isn't) better:

          def get_even_squares(numbers):
              result = []
              for n in numbers:
                  if n % 2 == 0:
                      result.append(n ** 2)
              return result

  # =========================================================================
  # CODING — medium (algorithm choice, edge cases, explanation)
  # =========================================================================

  - id: "code-binary-search"
    category: coding
    difficulty: medium
    tags: [python, algorithms, explanation]
    contamination_risk: high
    expected_answer: >
      Must use low/high pointers and mid = (low + high) // 2. Time O(log n),
      space O(1) for iterative. Common bug: using mid = (low + high) / 2
      (float division). Must handle empty list and missing element.
    messages:
      - role: user
        content: |
          Explain how binary search works step by step,
          then implement it in Python.
          Analyze its time and space complexity.

  - id: "code-rate-limiter"
    category: coding
    difficulty: medium
    tags: [python, algorithms, design]
    contamination_risk: medium
    messages:
      - role: user
        content: |
          Implement a simple rate limiter class in Python that allows
          at most N requests per time window of W seconds.
          Explain your design choices.

  - id: "code-csv-parser"
    category: coding
    difficulty: medium
    tags: [python, parsing]
    contamination_risk: low
    expected_answer: >
      Must handle quoted fields containing commas (e.g., "Smith, Jr." stays
      as one field). Must use first row as header keys. Should handle
      escaped quotes within quoted fields.
    messages:
      - role: user
        content: |
          Write a Python function that parses a CSV string into a list
          of dictionaries, using the first row as headers. Handle quoted
          fields that may contain commas. Don't use the csv module.

  - id: "code-retry-decorator"
    category: coding
    difficulty: medium
    tags: [python, decorators, error-handling]
    contamination_risk: medium
    expected_answer: >
      Decorator must accept max_retries parameter. Must implement exponential
      backoff (delay doubles each retry). Must re-raise the last exception
      after exhausting retries. Should use functools.wraps to preserve
      function metadata.
    messages:
      - role: user
        content: |
          Write a Python decorator called `retry` that retries a function
          up to N times if it raises an exception, with exponential backoff.
          Show example usage.

  - id: "code-linked-list"
    category: coding
    difficulty: medium
    tags: [python, data-structures]
    contamination_risk: high
    expected_answer: >
      Must implement Node class with value/next. Append is O(n) without tail
      pointer, O(1) with. Delete must handle head deletion and missing values.
      __repr__ should show chain like "1 -> 2 -> 3 -> None".
    messages:
      - role: user
        content: |
          Implement a singly linked list in Python with methods for
          append, prepend, delete by value, and a __repr__ that shows
          the list contents. Explain when you'd use this over a Python list.

  - id: "code-cache-decorator"
    category: coding
    difficulty: medium
    tags: [python, decorators, performance]
    contamination_risk: medium
    expected_answer: >
      Must use a dict keyed by function arguments. Must handle unhashable
      arguments gracefully (either skip caching or raise clear error).
      Should mention limitation: unbounded cache growth without eviction.
    messages:
      - role: user
        content: |
          Write a memoization decorator in Python from scratch (don't use
          functools.lru_cache). It should cache results based on function
          arguments. Discuss the limitations of your approach.

  - id: "code-iterator"
    category: coding
    difficulty: medium
    tags: [python, iterators, protocol]
    contamination_risk: medium
    expected_answer: >
      Must implement __iter__ returning self and __next__ raising StopIteration
      when value exceeds max. Sequence: 0, 1, 1, 2, 3, 5, 8... Must work
      in a for loop.
    messages:
      - role: user
        content: |
          Write a Python class that implements the iterator protocol
          to yield Fibonacci numbers up to a maximum value. Show how
          to use it in a for loop.

  - id: "code-context-manager"
    category: coding
    difficulty: medium
    tags: [python, context-managers]
    contamination_risk: medium
    expected_answer: >
      Class version must implement __enter__ (start timer) and __exit__
      (print elapsed). contextlib version uses @contextmanager with yield.
      Should note class version is reusable and supports attributes,
      contextlib is more concise.
    messages:
      - role: user
        content: |
          Write a Python context manager called Timer that measures
          and prints the execution time of a code block. Implement it
          both as a class and using contextlib. Explain the tradeoffs.

  # =========================================================================
  # CODING — hard (design, tradeoffs, architecture)
  # =========================================================================

  - id: "code-thread-pool"
    category: coding
    difficulty: hard
    tags: [python, concurrency, design]
    contamination_risk: medium
    expected_answer: >
      Must use a task queue (Queue) with worker threads pulling from it.
      Must support shutdown/wait. Must mention GIL limits thread pool to
      I/O-bound tasks; CPU-bound needs multiprocessing.
    messages:
      - role: user
        content: |
          Implement a simple thread pool in Python that accepts callables,
          runs them across a fixed number of worker threads, and provides
          a way to wait for all tasks to complete. Discuss the GIL implications.

  - id: "code-event-emitter"
    category: coding
    difficulty: hard
    tags: [python, design-patterns]
    contamination_risk: medium
    expected_answer: >
      Must store callbacks in a dict[str, list[callable]]. on() appends,
      off() removes specific callback, emit() calls all registered handlers.
      Should handle exceptions in individual handlers without stopping other
      handlers. Thread safety requires a lock around the callback registry.
    messages:
      - role: user
        content: |
          Implement an EventEmitter class in Python that supports:
          - on(event, callback) to register handlers
          - emit(event, *args) to fire an event
          - off(event, callback) to unregister
          Include error handling and discuss thread safety.

  - id: "code-json-differ"
    category: coding
    difficulty: hard
    tags: [python, algorithms, recursion]
    contamination_risk: low
    expected_answer: >
      Must recursively compare nested dicts. Must report added keys,
      removed keys, and changed values separately. Must handle type
      changes (e.g., value was string, now dict). Lists can be compared
      by equality or element-wise.
    messages:
      - role: user
        content: |
          Write a Python function that takes two JSON-like Python dicts
          and returns a description of the differences: added keys,
          removed keys, and changed values (including nested dicts).

  # =========================================================================
  # REASONING — explanation quality
  # =========================================================================

  - id: "explain-big-o"
    category: reasoning
    difficulty: medium
    tags: [cs, algorithms, explanation]
    contamination_risk: high
    messages:
      - role: user
        content: |
          Explain Big O notation to someone who understands basic programming
          but has no formal CS education. Use concrete examples for O(1),
          O(n), O(n^2), and O(log n). Explain why it matters in practice.

  - id: "explain-rest-principles"
    category: reasoning
    difficulty: medium
    tags: [architecture, http, explanation]
    contamination_risk: high
    messages:
      - role: user
        content: |
          What are the core principles of REST? Explain each one and give
          an example of a common API design mistake that violates it.

  - id: "explain-git-rebase"
    category: reasoning
    difficulty: medium
    tags: [tools, git, explanation]
    contamination_risk: high
    messages:
      - role: user
        content: |
          Explain the difference between git merge and git rebase.
          When would you use each? What are the dangers of rebasing?

  - id: "explain-solid"
    category: reasoning
    difficulty: hard
    tags: [cs, design-principles, explanation]
    contamination_risk: high
    options:
      num_predict: 8192
    messages:
      - role: user
        content: |
          Explain the SOLID principles with a concrete Python example
          for each. Don't just define them — show code that violates
          each principle, then refactor it to comply.

  - id: "explain-concurrency"
    category: reasoning
    difficulty: hard
    tags: [cs, concurrency, explanation]
    contamination_risk: medium
    messages:
      - role: user
        content: |
          Explain the difference between concurrency and parallelism.
          Then explain threads vs processes vs async/await in Python,
          including when each is appropriate and why.

  # =========================================================================
  # CROSS-DOMAIN — design judgment, tradeoffs, no single right answer
  # =========================================================================

  - id: "design-rest-api"
    category: cross-domain
    difficulty: hard
    tags: [architecture, http, databases]
    contamination_risk: high
    messages:
      - role: user
        content: |
          Design a REST API for a library management system.
          Include endpoints, data models, error handling strategy,
          and explain your choices.

  - id: "design-auth-system"
    category: cross-domain
    difficulty: hard
    tags: [security, architecture, design]
    contamination_risk: medium
    messages:
      - role: user
        content: |
          Design an authentication and authorization system for a
          multi-tenant SaaS application. Cover user registration,
          login, session management, role-based access, and at least
          three security considerations.

  - id: "design-queue-system"
    category: cross-domain
    difficulty: hard
    tags: [architecture, distributed, design]
    contamination_risk: medium
    messages:
      - role: user
        content: |
          Design a simple message queue system. Cover the API,
          persistence strategy, delivery guarantees, and how you'd
          handle consumer failures. Compare at-most-once vs
          at-least-once vs exactly-once delivery.

  - id: "debug-race-condition"
    category: cross-domain
    difficulty: hard
    tags: [debugging, concurrency]
    contamination_risk: low
    messages:
      - role: user
        content: |
          This Python code has a race condition. Identify it, explain
          why it's dangerous, and fix it:

          import threading

          counter = 0

          def increment():
              global counter
              for _ in range(100000):
                  counter += 1

          threads = [threading.Thread(target=increment) for _ in range(4)]
          for t in threads: t.start()
          for t in threads: t.join()
          print(counter)

  - id: "refactor-god-function"
    category: cross-domain
    difficulty: medium
    tags: [python, refactoring, design]
    contamination_risk: low
    messages:
      - role: user
        content: |
          This function does too many things. Refactor it into smaller,
          well-named functions and explain your reasoning:

          def process_order(order):
              if order['quantity'] <= 0:
                  return {'error': 'Invalid quantity'}
              subtotal = order['price'] * order['quantity']
              if order.get('coupon') == 'SAVE10':
                  subtotal *= 0.9
              tax = subtotal * 0.08
              total = subtotal + tax
              if order.get('email'):
                  print(f"Sending receipt to {order['email']}")
              return {'subtotal': subtotal, 'tax': tax, 'total': total}

  - id: "review-code-pr"
    category: cross-domain
    difficulty: medium
    tags: [code-review, python, quality]
    contamination_risk: low
    messages:
      - role: user
        content: |
          Review this Python code as if it were a pull request.
          Point out bugs, style issues, and suggest improvements:

          def get_user_data(user_id):
              import requests
              resp = requests.get(f"http://api.example.com/users/{user_id}")
              data = resp.json()
              name = data['name']
              email = data['email']
              age = data['age']
              if age < 0:
                  age = 0
              return {"name": name, "email": email, "age": age, "is_adult": age >= 18}

  - id: "tradeoff-sql-nosql"
    category: cross-domain
    difficulty: medium
    tags: [databases, architecture, tradeoffs]
    contamination_risk: high
    messages:
      - role: user
        content: |
          You're building a social media platform. The core data includes
          user profiles, posts, comments, and follower relationships.
          Would you use a relational database, a document store, or both?
          Justify your choice with specific tradeoffs for each data type.

  - id: "tradeoff-mono-micro"
    category: cross-domain
    difficulty: hard
    tags: [architecture, tradeoffs, design]
    contamination_risk: high
    messages:
      - role: user
        content: |
          A startup has a monolithic Python application that's becoming
          hard to maintain. The CTO wants to move to microservices.
          Present a balanced argument: what are the real benefits,
          what are the hidden costs, and what would you recommend
          for a team of 5 engineers?

  - id: "phys-projectile-drag"
    category: physics-engineering
    difficulty: hard
    tags: [python, physics, runge-kutta, fluid-dynamics]
    contamination_risk: medium
    expected_answer: >
      CORRECTNESS: State vector [x, y, vx, vy]. Derivatives: dx/dt=vx,
      dy/dt=vy, dvx/dt = -(rho*Cd*A)/(2*m)*v*vx, dvy/dt = -g -
      (rho*Cd*A)/(2*m)*v*vy where v=sqrt(vx^2+vy^2). Cross-section
      A=pi*r^2. RK4 must correctly compute k1-k4. With drag: range ~115m
      vs ~163m without drag. dt <= 0.01s. Must detect ground crossing.

      DOMAIN: Drag grows as v^2 — at 40 m/s for this baseball, drag (~1.26N)
      is already comparable to gravity (~1.42N). Terminal velocity: v_t =
      sqrt(2mg/(rho*Cd*A)) ~ 42 m/s. Depends on m/A ratio, not mass alone
      — bowling ball vs beach ball of same mass. Reynolds number determines
      regime: Re < ~1 = Stokes (linear), Re > ~1000 = quadratic. Baseball
      at 40 m/s: Re ~ 200,000, firmly quadratic. Linear drag for: dust,
      bacteria, viscous fluids.

      TRAPS: "Heavier objects fall faster" — partially true but it's m/A
      ratio, not mass alone. "Drag is negligible for everyday objects" is
      WRONG at high speeds.
    messages:
      - role: user
        content: |
          Implement a projectile motion simulator in Python using the 4th-order
          Runge-Kutta (RK4) method that:

          1. Models 2D projectile motion with quadratic air resistance: F_drag = -½ρCdAv|v| (opposing velocity)
          2. Also computes the analytical no-drag trajectory for comparison
          3. Prints a table of time, x, y for both trajectories at regular intervals until the projectile hits the ground

          Parameters: mass = 0.145 kg (baseball), radius = 0.037 m, Cd = 0.3,
          ρ = 1.225 kg/m³. Launch at 45° with speed 40 m/s.

          Then answer:
          1. Why does the no-drag approximation fail for high-velocity objects? At what velocity does drag become the dominant force for this baseball?
          2. What is terminal velocity? Derive it from your drag formula. Why does it depend on the mass-to-cross-section ratio, not mass alone?
          3. When is the linear drag model (F ∝ v) valid instead of quadratic (F ∝ v²)? What dimensionless number determines which regime applies?

  - id: "phys-heat-diffusion"
    category: physics-engineering
    difficulty: hard
    tags: [python, physics, finite-difference, pde, thermodynamics]
    contamination_risk: medium
    expected_answer: >
      CORRECTNESS: FTCS: T_i^{n+1} = T_i^n + alpha*dt/dx^2 *
      (T_{i-1}^n - 2*T_i^n + T_{i+1}^n). CFL: alpha*dt/dx^2 <= 0.5. With
      dx=0.01m: max dt = 0.005s. Must show smooth evolution toward linear
      profile. Unstable dt should show growing oscillations. Must apply
      boundary conditions each step. At t=25s: approximately linear.

      DOMAIN: CFL: numerical domain of dependence must contain physical
      domain. If physical diffusion faster than numerical reach, scheme
      can't represent physics -> instability. Amplification factor of any
      Fourier mode must have |G| <= 1. Implicit (backward Euler): uses
      T^{n+1} on right side, tridiagonal solve, amplification always < 1,
      unconditionally stable. Tradeoff: explicit cheap per step but many
      small steps; implicit expensive per step but large dt. Steady state:
      dT/dt=0 -> d^2T/dx^2=0 -> T(x) = ax+b -> linear. Heat flux constant
      everywhere.

      TRAPS: "Smaller dt always more accurate" is WRONG if dx is coarse.
      "CFL guarantees accuracy" is WRONG — it guarantees stability only.
    messages:
      - role: user
        content: |
          Implement a 1D heat equation solver in Python using the explicit
          finite difference method (FTCS scheme):

          1. Model a 1-meter rod with fixed boundary temperatures: T(0) = 100°C, T(L) = 0°C
          2. Initial condition: T(x, 0) = 0°C for all interior points
          3. Thermal diffusivity α = 0.01 m²/s
          4. Print the temperature profile at t = 0, 1, 5, and 25 seconds

          Choose appropriate spatial and temporal discretization. Show what
          happens if you violate the stability condition by doubling the time
          step beyond the CFL limit.

          Then answer:
          1. What is the CFL condition for this scheme, and derive why it must be satisfied? What does information propagation have to do with it?
          2. Why is the explicit method conditionally stable while the implicit (backward Euler) method is unconditionally stable? What's the tradeoff?
          3. Why does the steady-state solution approach a linear temperature profile? Derive this from the heat equation.

  - id: "phys-pendulum-chaos"
    category: physics-engineering
    difficulty: hard
    tags: [python, physics, chaos-theory, nonlinear-dynamics, runge-kutta]
    contamination_risk: low
    expected_answer: >
      CORRECTNESS: Must use correct Lagrangian equations (coupled 2nd-order
      ODEs involving cos/sin of angle differences). State vector [theta1,
      theta2, omega1, omega2]. At theta1=theta2=2.0 rad (large angle),
      system is chaotic. Divergence starts ~0.001 and grows exponentially
      until trajectories uncorrelated (~10-15s). dt <= 0.001s for accuracy.

      DOMAIN: Positive Lyapunov exponent = exponential divergence of nearby
      trajectories = chaos = long-term prediction impossible. Single
      pendulum NOT chaotic: 1 DOF, integrable, 2D phase space, energy
      constrains to 1D curves — can't cross (uniqueness theorem). Double
      pendulum: 2 DOF, 4D phase space, trajectories exhibit complexity
      impossible in 2D. Linearization at small angles gives coupled
      oscillators (normal modes), but at large angles (2 rad ~ 115°)
      nonlinear terms dominate — linearized approximation is qualitatively
      wrong (predicts regular where actual is chaotic).

      TRAPS: "Butterfly effect means small changes always grow" is WRONG —
      only in chaotic systems. "Chaos means random" is WRONG — deterministic.
      "Double pendulum is always chaotic" is WRONG — regular at low energy.
    messages:
      - role: user
        content: |
          Implement a double pendulum simulation in Python using RK4:

          1. Two point masses (m1=m2=1 kg) on rigid massless rods (l1=l2=1 m) under gravity
          2. Use the Lagrangian-derived equations of motion
          3. Run two trajectories: θ1=2.0, θ2=2.0 (A) and θ1=2.0, θ2=2.001 (B)
          4. Print angular positions of the second pendulum for both at t = 0, 5, 10, 15, 20 seconds
          5. Compute and print the divergence |θ2_A(t) - θ2_B(t)| at each time step

          Then answer:
          1. Why do the trajectories diverge despite nearly identical initial conditions? What is the Lyapunov exponent and what does a positive value mean?
          2. Why is a SINGLE pendulum NOT chaotic? What mathematical property distinguishes the two systems?
          3. What breaks when you linearize the double pendulum equations? Why does linearization fail here but succeed for a single pendulum at small angles?

  - id: "phys-circuit-filter"
    category: physics-engineering
    difficulty: medium
    tags: [python, physics, electrical-engineering, signal-processing]
    contamination_risk: medium
    expected_answer: >
      CORRECTNESS: Resonant frequency f_0 = 1/(2*pi*sqrt(0.1*1e-6)) ~
      503.3 Hz. State variables: charge q, current I=dq/dt. Equations:
      dI/dt = (V_in - R*I - q/C)/L, dq/dt = I. Output V_R = R*I. At
      resonance V_R ~ V_in. 100 Hz and 2000 Hz attenuated. Run >= 10-20ms
      for transient decay. dt <= 50us to resolve 2000 Hz.

      DOMAIN: At f_0, L and C impedances cancel (jωL = 1/(jωC)). Energy
      oscillates between inductor magnetic field and capacitor electric
      field. Q = (1/R)*sqrt(L/C) ~ 3.16. Bandwidth BW = f_0/Q ~ 159 Hz.
      Lower R -> higher Q -> narrower bandwidth, sharper peak. Parasitics:
      inductor parasitic capacitance (turns as plates, self-resonance);
      capacitor ESL (lead inductance, high-freq resonance); skin effect
      (current on wire surface at high freq, increasing R); dielectric
      losses in capacitor.

      TRAPS: "Higher Q always better" is WRONG — narrow bandwidth rejects
      wanted frequencies, ringing distorts time-domain signals. "Resonant
      frequency = max output" — true for V_R, but V_L peaks above f_0
      and V_C peaks below.
    messages:
      - role: user
        content: |
          Implement a discrete-time simulation of a series RLC bandpass filter
          in Python:

          1. Components: R = 100 Ω, L = 0.1 H, C = 1 μF in series
          2. Circuit equation: L·d²q/dt² + R·dq/dt + q/C = V_in(t)
          3. Drive with a sum of three sinusoids: f = 100 Hz, 503 Hz (near resonance), and 2000 Hz, each amplitude 1V
          4. After transients decay, measure amplitude of each frequency component in the output voltage across R

          Compute resonant frequency analytically: f₀ = 1/(2π√(LC)) and
          verify it matches the simulation peak.

          Then answer:
          1. Why does the RLC circuit resonate? Explain in terms of energy exchange between L and C.
          2. What is the quality factor Q, how does it relate to bandwidth, and what happens to selectivity as R decreases?
          3. Why do real circuits deviate from this ideal model at high frequencies? Name at least two parasitic effects.

  - id: "phys-pid-controller"
    category: physics-engineering
    difficulty: hard
    tags: [python, control-theory, pid, anti-windup, robotics]
    contamination_risk: medium
    expected_answer: >
      CORRECTNESS: P-only: steady-state error present (T never reaches
      setpoint). PI: integral eliminates error but causes overshoot. PID:
      derivative reduces overshoot. Anti-windup: when output saturated [0,1],
      stop integrating. Output must clip to [0,1]. Reasonable gains: Kp ~
      0.02-0.05, Ki ~ 0.001-0.005, Kd ~ 0.1-0.5 for this system.

      DOMAIN: Integral windup: output saturated but integral keeps
      accumulating — huge overshoot when error changes sign. Derivative
      amplifies noise because it computes rate of change — sensor noise
      (70.1, 69.9, 70.1) creates high-frequency oscillation. Derivative
      kick: step setpoint change creates huge e(k)-e(k-1) spike. Fix:
      "derivative on measurement" uses -T(k)+T(k-1) instead. Ziegler-
      Nichols: increase Kp until sustained oscillation (critical K_u at
      period P_u), set Kp=0.6*K_u, Ki=2*Kp/P_u, Kd=Kp*P_u/8. Limitations:
      aggressive tuning (~25% overshoot), requires oscillation (unsafe),
      assumes linear time-invariant.

      TRAPS: "Higher gains = faster response" — only to critical gain, then
      unstable. "PID always better than PI" is WRONG — with noisy sensors,
      D term hurts. "Anti-windup is optional" is WRONG for real systems.
    messages:
      - role: user
        content: |
          Implement a discrete PID controller in Python for a simulated
          first-order thermal system:

          1. Plant: T(k+1) = T(k) + dt/τ * (K·u(k) - T(k) + T_ambient), where τ=10s, K=50°C/unit, T_ambient=20°C
          2. PID: u(k) = Kp·e(k) + Ki·Σe(j)·dt + Kd·(e(k)-e(k-1))/dt, where e = T_setpoint - T
          3. Include integral anti-windup (clamp integral when output saturates at [0, 1])
          4. Run three simulations with setpoint=70°C: (a) P-only, (b) PI, (c) PID
          5. Print temperature every second for 60 seconds

          Choose reasonable gains. Show that P-only has steady-state error,
          PI eliminates it but overshoots, and PID reduces overshoot.

          Then answer:
          1. What is integral windup, and demonstrate how your anti-windup prevents it. What would happen without it?
          2. Why does derivative gain reduce overshoot but amplify sensor noise? What is "derivative kick" and how does "derivative on measurement" solve it?
          3. How would you tune these gains systematically? Describe the Ziegler-Nichols method and its limitations.

  - id: "phys-kalman-1d"
    category: physics-engineering
    difficulty: hard
    tags: [python, estimation-theory, kalman-filter, signal-processing, robotics]
    contamination_risk: medium
    expected_answer: >
      CORRECTNESS: F = [[1,dt],[0,1]]. H = [1,0]. Q = sigma_accel^2 *
      [[dt^4/4, dt^3/2],[dt^3/2, dt^2]]. R = sigma_meas^2. Predict:
      x_pred = F*x, P_pred = F*P*F^T + Q. Update: K = P_pred*H^T *
      (H*P_pred*H^T + R)^-1, x = x_pred + K*(z - H*x_pred), P =
      (I-K*H)*P_pred. Gain starts large (~0.5-1.0), converges to small
      steady-state. During acceleration, visible lag as velocity estimate
      slowly catches up.

      DOMAIN: Gain decreases because state uncertainty P decreases — filter
      becomes confident, less responsive. Innovation e(k) = z(k) -
      H*x_pred(k) should be zero-mean white noise if model correct.
      Detect mismatch: running mean of innovations drifts from zero; NIS
      test (e^T*S^-1*e should follow chi-squared); CUSUM detects mean
      shift. Process noise too low: trusts model too much, can't track
      maneuvers. Too high: trusts measurements, output noisy. Fundamental
      tradeoff: model trust vs measurement responsiveness.

      TRAPS: "Lower measurement noise always improves tracking" — only if
      model correct; with mismatch, trusting measurements more can help.
      "Kalman filter is optimal" — only under its assumptions. "Increasing
      process noise fixes model mismatch" — band-aid, not a fix.
    messages:
      - role: user
        content: |
          Implement a 1D Kalman filter in Python for tracking position from
          noisy measurements:

          1. State: [position, velocity]. Transition: constant velocity model with process noise
          2. Measurement: position only, with Gaussian noise (σ_meas = 5 meters)
          3. Process noise: acceleration disturbance with σ_accel = 0.5 m/s²
          4. Simulate a target at 2 m/s for 100 steps (dt=1s), then 4 m/s for 50 more steps
          5. Print: true position, measured position, filtered position, and Kalman gain at intervals of 10 steps

          Then answer:
          1. Why does the Kalman gain decrease over time? What happens when the target accelerates — does the filter detect the model mismatch?
          2. What is the innovation sequence, and how would you use it to detect that your process model is wrong? What statistical test would you apply?
          3. What happens if process noise is set too low? Too high? What is the fundamental tradeoff?
